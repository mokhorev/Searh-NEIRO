name: CI

on:
  push:
    branches: [main, "feature/**", "integration/**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint Measurement Core and exports
        run: >-
          ruff check
          src/neirosearch/measurement
          src/neirosearch/measurement_cli.py
          src/neirosearch/reports.py
          tests/test_measurement_importer.py
          tests/test_measurement_models.py
          tests/test_measurement_store.py
          tests/test_reports_security.py
      - name: Test
        run: pytest -q
      - name: Compile package
        run: python -m compileall -q src/neirosearch
